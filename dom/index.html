<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple To-Do List</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #task-input { width: 300px; padding: 8px; }
    #add-btn { padding: 8px 12px; }
    ul { list-style: none; padding: 0; }
    li { margin: 8px 0; }
    .delete-btn { margin-left: 12px; color: red; cursor: pointer; }
  </style>
</head>
<body>

  <h2>To-Do List</h2>
  <input id="task-input" type="text" placeholder="Enter a new task" />
  <button id="add-btn">Add</button>

  <ul id="task-list"></ul>

  <script src="app.js"></script>
</body>
</html>
